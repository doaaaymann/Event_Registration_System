spring:
  application:
    name: auth-service
  config:
    import: configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 2000
        max-attempts: 15
        max-interval: 5000
        multiplier: 1.5

management:
  endpoints:
    web:
      exposure:
        include: health,info
